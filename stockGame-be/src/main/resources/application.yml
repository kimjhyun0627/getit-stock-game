server:
  port: ${PORT:3000}

spring:
  application:
    name: stockgame-be
  datasource:
    url: jdbc:sqlite:stockgame.db
    driver-class-name: org.sqlite.JDBC
  jpa:
    database-platform: org.hibernate.community.dialect.SQLiteDialect
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
  jackson:
    serialization:
      write-dates-as-timestamps: false

app:
  jwt:
    secret: ${JWT_SECRET:your-super-secret-jwt-key-here}
    access-expires-in: ${JWT_ACCESS_EXPIRES_IN:2h}
    refresh-expires-in: ${JWT_REFRESH_EXPIRES_IN:7d}
  kakao:
    client-id: ${KAKAO_CLIENT_ID:your-kakao-client-id}
    client-secret: ${KAKAO_CLIENT_SECRET:your-kakao-client-secret}
    redirect-uri: ${KAKAO_REDIRECT_URI:http://localhost:3000/api/auth/kakao/callback}
  google:
    client-id: ${GOOGLE_CLIENT_ID:your-google-client-id}
    client-secret: ${GOOGLE_CLIENT_SECRET:your-google-client-secret}
    redirect-uri: ${GOOGLE_REDIRECT_URI:http://localhost:3000/api/auth/google/callback}
  frontend-url: ${FRONTEND_URL:http://localhost:5173}
  admin-password: ${ADMIN_PASSWORD:}
