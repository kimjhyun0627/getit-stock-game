spring:
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_DATABASE:stockgame}?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Seoul
    username: ${DB_USERNAME:stockgame}
    password: ${DB_PASSWORD:stockgame}
    driver-class-name: com.mysql.cj.jdbc.Driver
  sql:
    init:
      mode: always
  jpa:
    database-platform: org.hibernate.dialect.MySQLDialect
    hibernate:
      ddl-auto: none

app:
  kakao:
    redirect-uri: ${KAKAO_REDIRECT_URI:http://localhost/api/auth/kakao/callback}
  google:
    redirect-uri: ${GOOGLE_REDIRECT_URI:http://localhost/api/auth/google/callback}
  frontend-url: ${FRONTEND_URL:http://localhost}
